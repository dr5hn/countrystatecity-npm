name: Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGERS
#   push / pull_request  → stages 2-5 (generate from git source.json + CI)
#   schedule / dispatch  → all stages (fetch fresh data + CI + PR)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'   # every Sunday at 00:00 UTC
  workflow_dispatch:
    inputs:
      force_pr:
        description: 'Open PR even if data has not changed'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 1 — FETCH DATA  (schedule / workflow_dispatch only)
  #   Downloads the latest upstream database and uploads it as an artifact.
  #   On push/PR this job is skipped; generate-data uses source.json from git.
  # ───────────────────────────────────────────────────────────────────────────
  fetch-data:
    name: Fetch Upstream Data
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download latest countries-states-cities database
        run: pnpm fetch-database

      - name: Upload raw source data
        uses: actions/upload-artifact@v4
        with:
          name: source-data
          path: data/source.json
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 2 — GENERATE DATA  (always runs)
  #   On push/PR:        uses source.json committed in git; hits cache most runs.
  #   On schedule/dispatch: downloads fresh source.json artifact; cache likely misses.
  # ───────────────────────────────────────────────────────────────────────────
  generate-data:
    name: Generate Package Data
    needs: fetch-data
    if: >-
      always() &&
      (needs.fetch-data.result == 'success' ||
       needs.fetch-data.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      countries: ${{ steps.stats.outputs.countries }}
      timezones: ${{ steps.stats.outputs.timezones }}
      currencies: ${{ steps.stats.outputs.currencies }}
      translations: ${{ steps.stats.outputs.translations }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore fresh source data
        if: needs.fetch-data.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: source-data
          path: data/
        continue-on-error: true

      - name: Detect data changes
        id: check
        run: |
          if git status --porcelain -- data/source.json | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Source data has changed:"
            git diff --stat -- data/source.json 2>/dev/null || git status --short -- data/source.json
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes — source.json is already up to date."
          fi

      - name: Cache generated data
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            packages/countries/src/data
            packages/countries-browser/src/data
            packages/timezones/src/data
            packages/currencies/src/data
            packages/translations/src/data
          key: generated-data-${{ hashFiles('data/source.json') }}

      - name: Generate data for all packages
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm generate-data

      - name: Collect statistics
        id: stats
        run: |
          echo "countries=$(grep -o '"id"' packages/countries/src/data/countries.json | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "timezones=$(grep -o '"zoneName"' packages/timezones/src/data/timezones.json | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "currencies=$(grep -o '"code"' packages/currencies/src/data/currencies.json | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "translations=$(grep -o '"iso2"' packages/translations/src/data/translations.json | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Upload generated data
        uses: actions/upload-artifact@v4
        with:
          name: generated-data
          path: packages/*/src/data
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 3 — TYPECHECK
  # ───────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    needs: [generate-data]
    if: needs.generate-data.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply generated data
        uses: actions/download-artifact@v4
        with:
          name: generated-data
          path: packages/

      - name: Typecheck all packages
        run: pnpm turbo run typecheck

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 4 — BUILD
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [generate-data, typecheck]
    if: needs.typecheck.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply generated data
        uses: actions/download-artifact@v4
        with:
          name: generated-data
          path: packages/

      - name: Build all packages
        run: pnpm turbo run build

      - name: Bundle sizes
        run: |
          echo "=== Bundle Sizes ==="
          for pkg in countries countries-browser timezones currencies translations; do
            echo "── $pkg ──"
            du -sh packages/$pkg/dist/index.js 2>/dev/null || true
            du -sh packages/$pkg/dist/index.cjs 2>/dev/null || true
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: packages/*/dist
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 5 — TEST
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: [generate-data, build]
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply generated data
        uses: actions/download-artifact@v4
        with:
          name: generated-data
          path: packages/

      - name: Run all tests
        run: pnpm turbo run test

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 6 — OPEN DATA UPDATE PR
  #   Commits the updated source.json. Package data is regenerated from it in CI.
  # ───────────────────────────────────────────────────────────────────────────
  open-pr:
    name: Open Data Update PR
    needs: [generate-data, test]
    if: >-
      always() &&
      needs.generate-data.result == 'success' &&
      needs.test.result == 'success' &&
      (needs.generate-data.outputs.changed == 'true' ||
       github.event.inputs.force_pr == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore updated source data
        uses: actions/download-artifact@v4
        with:
          name: source-data
          path: data/

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update source data from countries-states-cities-database'
          title: '🔄 Automated Data Update'
          body: |
            ## Automated Data Update

            Latest data from [dr5hn/countries-states-cities-database](https://github.com/dr5hn/countries-states-cities-database).

            ### Statistics
            | Package | Count |
            |---|---|
            | Countries | ${{ needs.generate-data.outputs.countries }} |
            | Timezones | ${{ needs.generate-data.outputs.timezones }} |
            | Currencies | ${{ needs.generate-data.outputs.currencies }} |
            | Translations | ${{ needs.generate-data.outputs.translations }} |

            ### Verification
            - ✅ Data fetched and generated
            - ✅ All packages built successfully
            - ✅ All tests passing

            > `data/source.json` has been updated. Package data (`src/data/`) is regenerated from it automatically during CI — it is no longer committed to the repo.
          branch: automated-data-update
          delete-branch: true
          labels: |
            automated
            data-update
